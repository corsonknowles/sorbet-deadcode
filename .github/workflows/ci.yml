name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: "Ruby ${{ matrix.ruby }}"
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        ruby:
          - "3.4"
          - "4.0"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby ${{ matrix.ruby }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - name: Install ripgrep
        run: sudo apt-get install -y ripgrep

      - name: Run tests
        run: bundle exec rake test

  lint:
    name: RuboCop
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true

      - name: Run RuboCop
        run: bundle exec rake lint

  spoom-integration:
    name: Spoom integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Install the optional :spoom group so the live Spoom::Runner integration test runs
      # (it skips when spoom is absent). This lane catches drift in spoom's internal API.
      - name: Enable the optional spoom group
        run: bundle config set --local with spoom

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true

      - name: Install ripgrep
        run: sudo apt-get install -y ripgrep

      - name: Run tests with spoom
        run: bundle exec rake test
