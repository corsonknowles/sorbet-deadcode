plugins:
  - rubocop-minitest
  - rubocop-rake

AllCops:
  TargetRubyVersion: 3.4
  NewCops: enable
  SuggestExtensions: false
  Exclude:
    - "spec/fixtures/**/*"
    - "vendor/**/*"
    - "tmp/**/*"

# This gem doesn't enforce a formatter/style. We lint for correctness only —
# Lint, Naming, Minitest, Gemspec — and leave formatting to the author.
Style:
  Enabled: false

Layout:
  Enabled: false

# Parser/AST code: visitor methods and the analyzer are naturally long/branchy.
Metrics:
  Enabled: false

# Case statements that map several distinct cases to the same small result are
# clearer kept separate; common in the parser/classifier code.
Lint/DuplicateBranch:
  Enabled: false

# `assert refs.any? { ... }` reads fine and binds the block to the inner call as
# intended; wrapping every spec assertion in parens is pure noise. Keep the cop
# on for lib/exe (where genuine ambiguity matters), just not for specs.
Lint/AmbiguousBlockAssociation:
  Exclude:
    - "spec/**/*"

# Keyword args are often kept for interface symmetry (test helpers, finder
# constructors) even when a given path doesn't read them.
Lint/UnusedMethodArgument:
  AllowUnusedKeywordArguments: true

# Specs use one Minitest class per unit with multiple intentional expectations.
Minitest/MultipleAssertions:
  Enabled: false
